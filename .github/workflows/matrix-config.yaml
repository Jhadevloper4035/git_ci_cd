name: Matrix Stragey 

on: push

jobs:
    deploy:
        strategy:
            matrix:
              os: [ubuntu-latest , ubuntu-22.0.4 , windows-latest ]
              images: [hello-world , alpine]

        runs-on: ${{matrix.os}}
        steps:
        - name: Echo Docker Detail
          run: docker info

        - name: Runs Images on ${{ matrix.os }}
          run: docker run ${{ matrix.images }}

          


