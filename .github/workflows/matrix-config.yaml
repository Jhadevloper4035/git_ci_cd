name: Matrix Stragey 

on: push

jobs:
    deploy:
        strategy:
            fail-fast: true    
            max-parallel: 2
            matrix:
              os: [ubuntu-latest , ubuntu-22.04 , windows-latest ]
              images: [hello-world , alpine]
              exclude:
                - images: alpine
                  os: windows-latest
              include:
                - images: amd64/alpine
                  os: ubuntu-22.04

        runs-on: ${{matrix.os}}
        steps:
        - name: Echo Docker Detail
          run: docker info

        - name: Runs Images on ${{ matrix.os }}
          run: docker run ${{ matrix.images }}


# What fail-fast: true does
# If any one matrix job fails, GitHub will immediately cancel all other running or queued jobs in that matrix.