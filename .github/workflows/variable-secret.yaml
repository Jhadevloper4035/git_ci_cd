name: Exploring Variable Secret

on: push


env:
    CONTAINER_REGISTER: docker.io
    DOCKER_USERNAME: devil4035
    IMAGE_NAME: github-actions-nginx


jobs:
    docker:
        runs-on: ubuntu-latest
        steps:
            - name: Docker Build
              run:  echo docker build -t ${{ env.CONTAINER_REGISTER}}/${{env.DOCKER_USERNAME}}/${{env.IMAGE_NAME}} 
            
            - name: Docker Login
              run: echo docker login -u ${{env.DOCKER_USERNAME}} -p ${{ secrets.DOCKER_ACCESS_TOKEN   }}

            - name: Docker Publish 
              run:  echo docker push ${{env.CONTAINER_REGISTER}}/${{env.DOCKER_USERNAME}}/${{env.IMAGE_NAME}}


    deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Docker Run
              run: echo docker run -d -p 8080:80 ${{env.CONTAINER_REGISTER}}/${{env.DOCKER_USERNAME}}/${{env.IMAGE_NAME}} 